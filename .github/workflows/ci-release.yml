name: CI & Release

on:
  push:
    branches: [ main, master ]
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build, test & lint
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev

      - name: Install rustfmt & clippy
        run: rustup component add rustfmt clippy

      - name: Cargo fmt (check)
        run: cargo fmt --all -- --check

      - name: Cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Cargo build
        run: cargo build --release

      - name: Cargo test
        run: cargo test --release

  release:
    name: Build & publish release artifacts
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev

      - name: Set version in Cargo.toml from tag
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "Setting Cargo.toml version to $TAG_VERSION"
          sed -i.bak "s/^version = .*/version = \"$TAG_VERSION\"/" Cargo.toml && rm -f Cargo.toml.bak
          grep '^version' Cargo.toml

      - name: Build release binary
        run: cargo build --release

      - name: Package binary
        id: package
        shell: bash
        run: |
          set -e
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          BIN_NAME="meshcorestat"

          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            BIN_PATH="target/release/${BIN_NAME}.exe"
            ARCHIVE_NAME="${BIN_NAME}-${TAG_VERSION}-x86_64-pc-windows-msvc.tar.gz"
          else
            BIN_PATH="target/release/${BIN_NAME}"
            ARCHIVE_NAME="${BIN_NAME}-${TAG_VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          fi

          if [ ! -f "$BIN_PATH" ]; then
            echo "Binary not found at $BIN_PATH"
            exit 1
          fi

          tar czf "$ARCHIVE_NAME" "$BIN_PATH"
          echo "archive_name=$ARCHIVE_NAME" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.package.outputs.archive_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

